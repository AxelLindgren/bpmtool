<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axel Studio Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e0e0e;
    --surface:  #151515;
    --border:   #222;
    --green:    #4dbe82;
    --green-dim:#2a6e49;
    --text:     #e8e8e4;
    --muted:    #9a9a94;
    --dim:      #666660;
    --font-body: 'Cormorant Garamond', serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    min-height: 100vh;
  }

  .app {
    max-width: 780px;
    margin: 0 auto;
    padding: 80px 20px 60px;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
    margin-bottom: 36px;
  }
  .title {
    font-family: var(--font-body);
    font-size: 28px;
    font-weight: 400;
    letter-spacing: .04em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .subtitle {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .links { display: flex; flex-direction: column; gap: 0; }

  .link-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 18px 4px;
    border-bottom: 1px solid #1a1a1a;
    text-decoration: none;
    color: inherit;
    transition: background .12s, padding .15s;
  }
  .link-row:hover {
    background: #141414;
    padding-left: 12px;
    padding-right: 12px;
  }
  .link-row:hover .link-name { color: var(--green); }
  .link-row:hover .arrow { color: var(--green); transform: translateX(4px); }

  .link-name {
    font-family: var(--font-body);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: .04em;
    color: var(--text);
    margin-bottom: 3px;
    transition: color .15s;
  }
  .link-desc {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .08em;
    color: var(--dim);
  }
  .arrow {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--dim);
    transition: all .15s;
  }

  .footer {
    margin-top: 48px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: left;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="title">Axel Studio Tools</div>
    <div class="subtitle">utilities · references · calculators</div>
  </div>

  <div class="links">

    <a class="link-row" href="bpmflcalc2.html">
      <div>
        <div class="link-name">BPM → MS Calculator</div>
        <div class="link-desc">note divisions · plugin presets · comp values</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a class="link-row" href="referencetool.html">
      <div>
        <div class="link-name">Reference Tool</div>
        <div class="link-desc">mixing &amp; mastering reference</div>
      </div>
      <div class="arrow">→</div>
    </a>

  </div>

  <div class="footer">© Axel Lindgren</div>

</div>
</body>
</html>
